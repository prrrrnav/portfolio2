    <rect x="-35" y="-22" width="70" height="50" rx="8" fill="#ffdb70" fill-opacity="0.08" stroke="#ffdb70" stroke-width="5"/>
    <circle cx="0" cy="3" r="7" fill="#ffdb70"/>
    <rect x="64" y="10" width="10" height="18" fill="#ffdb70" opacity="0.4"/>
