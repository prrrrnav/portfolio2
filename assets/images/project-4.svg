<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="title4">
  <title id="title4">IoT Air Quality Monitoring System</title>
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#161617"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffbb5c"/>
    </linearGradient>
    <radialGradient id="glow4" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffdb70" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffdb70" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg4)"/>
  <rect width="600" height="400" fill="url(#glow4)"/>
  <circle cx="40" cy="370" r="120" fill="#ffdb70" opacity="0.03"/>
  <circle cx="565" cy="35" r="140" fill="#ffdb70" opacity="0.04"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect width="600" height="5" fill="url(#accent4)"/>

  <g transform="translate(280,150)">
    <g stroke="#ffdb70" stroke-width="4" stroke-linecap="round">
      <line x1="-50" y1="-12" x2="-35" y2="-12"/>
      <line x1="-50" y1="3" x2="-35" y2="3"/>
      <line x1="-50" y1="18" x2="-35" y2="18"/>
      <line x1="35" y1="-12" x2="50" y2="-12"/>
      <line x1="35" y1="3" x2="50" y2="3"/>
