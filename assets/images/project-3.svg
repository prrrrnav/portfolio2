<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="title3">
  <title id="title3">NIDAR Drone Navigation</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#161617"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffbb5c"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffdb70" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffdb70" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg3)"/>
  <rect width="600" height="400" fill="url(#glow3)"/>
  <circle cx="40" cy="370" r="120" fill="#ffdb70" opacity="0.03"/>
  <circle cx="565" cy="35" r="140" fill="#ffdb70" opacity="0.04"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect width="600" height="5" fill="url(#accent3)"/>

  <g transform="translate(300,150)">
    <path d="M-70 84 C-30 104 30 104 70 84" fill="none" stroke="#ffdb70" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 9" opacity="0.7"/>
    <g stroke="#ffdb70" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="-15" y1="-15" x2="-52" y2="-52"/>
      <line x1="15" y1="-15" x2="52" y2="-52"/>
      <line x1="-15" y1="15" x2="-52" y2="52"/>
      <line x1="15" y1="15" x2="52" y2="52"/>
    </g>
    <g fill="#1c1c1d" stroke="#ffdb70" stroke-width="4">
