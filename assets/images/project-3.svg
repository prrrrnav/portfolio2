      <circle cx="52" cy="-52" r="15"/>
      <circle cx="-52" cy="52" r="15"/>
      <circle cx="52" cy="52" r="15"/>
    </g>
    <g stroke="#ffdb70" stroke-width="3" stroke-linecap="round">
      <line x1="-67" y1="-52" x2="-37" y2="-52"/>
      <line x1="37" y1="-52" x2="67" y2="-52"/>
      <line x1="-67" y1="52" x2="-37" y2="52"/>
      <line x1="37" y1="52" x2="67" y2="52"/>
    </g>
    <rect x="-15" y="-15" width="30" height="30" rx="7" fill="#ffdb70" fill-opacity="0.1" stroke="#ffdb70" stroke-width="5"/>
  </g>

