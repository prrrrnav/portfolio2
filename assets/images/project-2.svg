<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="title2">
  <title id="title2">Applicant Tracking System (ATS)</title>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c2c2e"/>
      <stop offset="100%" stop-color="#161617"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffdb70"/>
      <stop offset="100%" stop-color="#ffbb5c"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffdb70" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffdb70" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg2)"/>
  <rect width="600" height="400" fill="url(#glow2)"/>
  <circle cx="40" cy="370" r="120" fill="#ffdb70" opacity="0.03"/>
  <circle cx="565" cy="35" r="140" fill="#ffdb70" opacity="0.04"/>
  <rect x="1" y="1" width="598" height="398" rx="16" fill="none" stroke="#3a3a3c" stroke-width="2"/>
  <rect width="600" height="5" fill="url(#accent2)"/>

  <g transform="translate(300,150)">
    <rect x="-60" y="-42" width="120" height="84" rx="10" fill="#ffdb70" fill-opacity="0.07" stroke="#ffdb70" stroke-width="5"/>
    <circle cx="-32" cy="-14" r="15" fill="#ffdb70"/>
    <g stroke="#ffffff" stroke-opacity="0.6" stroke-width="4" stroke-linecap="round">
      <line x1="-8" y1="-20" x2="44" y2="-20"/>
      <line x1="-8" y1="-4" x2="44" y2="-4"/>
      <line x1="-32" y1="12" x2="44" y2="12"/>
    </g>
    <circle cx="46" cy="30" r="18" fill="#1c1c1d" stroke="#ffdb70" stroke-width="4"/>
    <path d="M37 30 L44 37 L57 22" fill="none" stroke="#ffdb70" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

