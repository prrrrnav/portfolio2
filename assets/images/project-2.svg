  <text x="300" y="286" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="0.5">Applicant Tracking</text>
  <text x="300" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="0.5">System (ATS)</text>
